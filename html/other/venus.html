    <title>金星 - Venus</title>

<body>
    <h1>金星 (Venus)</h1>
    <p>金星是太阳系中第二颗行星，也是离地球最近的行星。</p>
    <ul>
        <li>类型：类地行星</li>
        <li>直径：约12,104公里</li>
        <li>与太阳距离：约1.08亿公里</li>
        <li>公转周期：225个地球日</li>
    </ul>
</body>
