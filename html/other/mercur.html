<body>
    <h1>水星 (Mercury)</h1>
    <p>水星是太阳系中最小且最靠近太阳的行星。</p>
    <ul>
        <li>类型：类地行星</li>
        <li>直径：约4,879公里</li>
        <li>与太阳距离：约5,790万公里</li>
        <li>公转周期：88个地球日</li>
    </ul>
