<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--HTML 可以通过 <div> 和 <span> 将元素组合起来并进行网页布局。

        HTML <div> 元素是块级元素，它可用于组合其他 HTML 元素的容器。
        <div> 元素没有特定的含义。除此之外，由于它属于块级元素，浏览器会在其前后显示折行。
        如果与 CSS 一同使用，<div> 元素可用于对大的内容块设置样式属性。
        <div> 元素的另一个常见的用途是文档布局。它取代了使用表格定义布局的老式方法。使用 <table> 元素进行文档布局不是表格的正确用法。<table> 元素的作用是显示表格化的数据。

        HTML <span> 元素
        HTML <span> 元素是内联元素，可用作文本的容器
        <span> 元素也没有特定的含义。
        当与 CSS 一同使用时，<span> 元素可用于为部分文本设置样式属性。

        1.div元素（division element）:
            块级元素，用于将内容分组为独立的块。每个块盛放小容器
            语法: <div>内容</div>
            div默认是纵向排列
        2.span元素（span element）:
            用于进行独立文本的修饰或标记的行内元素,与CSS一同使用
            语法: <span>内容</span>
            span默认是横向排列
     -->
    <div id="container" style="width:100%">

    <div id="header" style="background-color:#FFA500;">
    <h1 style="margin-bottom:0; text-align: center;">主要的网页标题</h1></div>

    <div id="menu" style="background-color:#FFD700;height:200px;width:10%;float:left;">
    <b>菜单</b>
    <br>
    HTML
    <br>
    CSS
    <br>
    JavaScript
    </div>

    <div id="content" style="background-color:#EEEEEE;height:200px;width:90%;float:left;">
    内容在这里</div>

    <div id="footer" style="background-color:#FFA500;clear:both;text-align:center;">
    版权 © runoob.com</div>

    </div>
</body>
</html>
