<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <!-- 图像 
        title="鼠标悬停的提示信息" 
        alt="图片不显示之后的提示信息"
        height（高度） 与 width（宽度）属性用于设置图像的高度与宽度。
        align 对齐

    -->
    <h1>图片示例</h1>
    <p><img src="img/img1.jpg" title="示例图片" alt="图片无法显示""></p>
    <!-- 图像映射：点击图像不同的区域，执行不同的操作。 
        <map>：定义图像映射。
        <area>： 定义图像映射的区域。

        coords: 定义图像映射的区域。
        shape: 定义图像映射的区域的形状。

        矩形（rect）- 4个数字 左上角和右下角坐标
        圆形（circle）- 3个数字 圆心坐标(cx,cy) 和 半径(r)
     -->
    <p><img src="img/planets.gif" width="145" height="126" alt="Planets" usemap="#planetmap"></p>
    <map name="planetmap">
        <area shape="rect" coords="0,0,82,126" alt="Sun" href="other/sun.html">
        <area shape="circle" coords="90,58,3" alt="Mercury" href="other/mercur.html">
        <area shape="circle" coords="124,58,8" alt="Venus" href="other/venus.html">
    </map>

    <!-- download="文件下载后的默认文件名" -->
    <p><a href="img/img1.jpg" download="img.jpg">下载图像文件</a></p>

    <!-- 超链接 -->
    <!-- target：定义链接的打开方式 
        target="_self" 表示在当前窗口打开链接
        target="_blank" 表示在新窗口打开链接
        target="_parent" 表示在父框架中打开链接
        target="_top" 表示在整个窗口中打开链接 -->
    <!-- title：定义链接的额外信息，当鼠标悬停在链接上时显示的工具提示。 -->
    <!-- hreflang: 指定链接的目标URL的语言 -->
    <!-- rel：定义链接与目标页面的关系 -->
    <a href="https://www.baidu.com" title="访问 baidu 网站" target="_self" hreflang="es">Click here to visit baidu</a>
    <br>

    <!-- 跳转到其它页面 -->
    <a href="project3_list.html">list 页面链接</a>
    <br>

    <!-- 在当前页面链接到指定位置 -->
    <!-- 返回顶部 -->
    <a href="#"> 返回顶部</a>
    <br>
    <!-- 锚点跳转:
        点击区域：<a href="#锚点名字">文本/图片</a>
        跳转区域：<div id="锚点名字"></div>
        应用场景：小说目录、百度百科
    -->
    <a href="#section1">章节1</a>
    <a href="#section2">章节2</a>
    <a href="#section3">章节3</a>
    <p>
        <div id="section1">
            <h2>章节1</h2>
            <p>这是章节1的内容。</p>
        </div>
        <div id="section2">
            <h2>章节2</h2>
            <p>这是章节2的内容。</p>
        </div>
        <div id="section3">
            <h2>章节3</h2>
            <p>这是章节3的内容。</p>
        </div>
    </p>
</body>
</html>
