<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 
    属性	描述
    color	设置文本颜色
    direction	设置文本方向。
    letter-spacing	设置字符间距
    line-height	设置行高
    text-align	对齐元素中的文本： left | right | center | justify | inherit (靠左 | 靠右 | 居中 | 两端对齐 | 继承)
    text-decoration	向文本添加修饰：none | underline | overline | line-through | blink (取消 | 下划线 | 上划线 | 删除线 | 闪烁)
    text-indent	缩进元素中文本的首行
    text-shadow	设置文本阴影
    text-transform	控制元素中的字母: none | capitalize | uppercase | lowercase | inherit (无 | 首字母大写 | 全大写 | 全小写 | 继承)
    unicode-bidi	设置或返回文本是否被重写 
    vertical-align	设置元素的垂直对齐
    white-space	设置元素中空白的处理方式
    word-spacing	设置字间距
    -->
    <style>
        p{
            text-align: justify;
        }
    </style>
</head>

</body>
</html>
