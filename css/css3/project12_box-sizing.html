<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- box-sizing 属性可以设置 width 和 height 属性中包含了 padding(内边距) 和 border(边框)。
     
    默认情况下，元素的宽度与高度计算方式如下：
    width(宽) + padding(内边距) + border(边框) = 元素实际宽度
    height(高) + padding(内边距) + border(边框) = 元素实际高度

    这就意味着我们在设置元素的 width/height 时，元素真实展示的高度与宽度会更大(因为元素的边框与内边距也会计算在 width/height 中)。
    box-sizing 属性在一个元素的 width 和 height 中包含 padding(内边距) 和 border(边框)。
    如果在元素上设置了 box-sizing: border-box; 则 padding(内边距) 和 border(边框) 也包含在 width 和 height 中

    值	含义	宽度计算
    content-box（默认）	只包含内容区域	width = 内容宽度
    border-box	包含内容 + padding + border	width = 内容 + 内边距 + 边框
    -->
    <style> 
    * {
        box-sizing: border-box;
    }
    .div1 {
        width: 300px;
        height: 100px;
        border: 1px solid blue;
        box-sizing: border-box;
    }

    .div2 {
        width: 300px;
        height: 100px;    
        padding: 25px;
        border: 2px solid red;
        box-sizing: border-box;
    }
    </style>
</head>
<body>
    <div class="div1">两个 div 现在是一样大小的!</div>
    <br>
    <div class="div2">菜鸟教程!</div>
</body>
</html>
