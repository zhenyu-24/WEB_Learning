<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 
    display
    值	独占一行	可设宽高	上下margin	默认宽度	主要用途
    block	✅	✅	✅	父容器100%	垂直布局、容器元素
    inline	❌	❌	❌	内容宽度	文字中的内联元素
    inline-block	❌	✅	✅	内容宽度	水平菜单、卡片组
    none	-	-	-	-	隐藏元素
    flex	✅	✅	✅	父容器100%	现代布局（一维）
    inline-flex	❌	✅	✅	内容宽度	内联 Flex 容器
    grid	✅	✅	✅	父容器100%	现代布局（二维）
    inline-grid	❌	✅	✅	内容宽度	内联 Grid 容器
    table	✅	✅	✅	父容器100%	表格布局（旧）
    list-item	✅	✅	✅	父容器100%	列表项（带标记）

    block:
    ┌─────────────────────────────────┐
    │          块级元素               │  ← 独占一行，宽100%
    ├─────────────────────────────────┤
    │          另一个块级元素         │  ← 独占一行
    └─────────────────────────────────┘

    inline:
    ┌─────────────────────────────────┐
    │ 行内│ 行内│ 行内│ 行内元素      │  ← 横排，不能设宽高
    └─────────────────────────────────┘

    inline-block:
    ┌─────────────────────────────────┐
    │ ┌───┐ ┌───┐ ┌───┐ ┌───┐        │
    │ │ A │ │ B │ │ C │ │ D │        │  ← 横排，可设宽高
    │ └───┘ └───┘ └───┘ └───┘        │
    └─────────────────────────────────┘
    -->
    <!-- 隐藏元素 - display:none或visibility:hidden
    隐藏一个元素可以通过把display属性设置为"none"，或把visibility属性设置为"hidden"。但是请注意，这两种方法会产生不同的结果。

    visibility:hidden可以隐藏某个元素，但隐藏的元素仍需占用与未隐藏之前一样的空间。也就是说，该元素虽然被隐藏了，但仍然会影响布局。
    -->
    <style>
    h1.hidden {display:none;}
    h2.hidden {visibility:hidden;}
    </style>
</head>
<body>
    <h1>这是一个可见标题</h1>
    <h1 class="hidden">这是一个隐藏标题</h1>
    <h2>这是一个可见标题</h2>
    <h2 class="hidden">这是一个可见标题</h2>
    <p>注意, 实例中的隐藏标题不占用空间。</p>
</body>
</html>
