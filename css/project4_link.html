<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 链接的样式，可以用任何CSS属性（如颜色，字体，背景等）。
    Property	描述
    a:link - 正常，未访问过的链接
    a:visited - 用户已访问过的链接
    a:hover - 当用户鼠标放在链接上时
    a:active - 链接被点击的那一刻

    target 属性
    _self - 默认。在相同的窗口中打开链接
    _blank - 在新窗口中打开链接
    _parent - 在父框架中打开链接
    _top - 在整个窗口中打开链接
    -->
    <style>
    a:link,a:visited
    {
        display:block;
        font-weight:bold;
        color:#FFFFFF;
        background-color:#98bf21;
        width:120px;
        text-align:center;
        padding:4px;
        text-decoration:none;
    }
    a:hover,a:active
    {
        background-color:#7A991A;
    }
    </style>
</head>
<body>
    <a href="./component/tooltip.html" target="_blank">这是一个链接</a>
</body>
</html>
