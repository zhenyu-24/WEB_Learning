<!DOCTYPE html>
<html>
<head>
<style>
    .ripple-btn {
        position: relative;
        background-color: #4CAF50;
        border: none;
        font-size: 20px;
        color: white;
        padding: 15px 30px;
        width: 200px;
        text-align: center;
        cursor: pointer;
        overflow: hidden;
        border-radius: 8px;
    }
    
    /* 波纹元素 */
    .ripple-btn::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        background: rgba(255, 255, 255, 0.5);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: width 0.4s, height 0.4s, opacity 0.4s;
        opacity: 0;
        pointer-events: none;  /* 让波纹不干扰点击 */
    }
    
    /* 点击时触发波纹 */
    .ripple-btn:active::after {
        width: 300px;
        height: 300px;
        opacity: 1;
        transition: 0s;  /* 立即出现 */
    }
</style>
</head>
<body>

    <h2>原始代码的波纹效果</h2>
    <button class="button">Click Me</button>

    <h2>更清晰的波纹效果</h2>
    <button class="ripple-btn">点击我</button>
</body>
</html>
