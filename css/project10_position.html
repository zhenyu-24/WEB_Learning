<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 
    值	说明	
    static	默认值，元素按照正常文档流排列，不受 top/right/bottom/left 影响
    relative	相对自身原始位置进行偏移，不会脱离文档流	
    absolute	相对于最近的已定位祖先元素(relative/absolute/fixed)进行定位（否则相对于 body），脱离文档流, 例如下拉菜单	
    fixed	相对于浏览器窗口定位，滚动页面时位置不会改变，对应width和height也是相当于游览器
    sticky	在滚动到指定位置前表现为 relative，之后表现为 fixed
    -->
    <style>
    h2.pos_left
    {
        position:relative;
        left:-20px;
    }

    h2.pos_right
    {
        position:relative;
        left:20px;
    }
    </style>
</head>
<body>
    <h2>这是位于正常位置的标题</h2>
    <h2 class="pos_left">这个标题相对于其正常位置向左移动</h2>
    <h2 class="pos_right">这个标题相对于其正常位置向右移动</h2>
    <p>相对定位会按照元素的原始位置对该元素进行移动。</p>
    <p>样式 "left:-20px" 从元素的原始左侧位置减去 20 像素。</p>
    <p>样式 "left:20px" 向元素的原始左侧位置增加 20 像素。</p>
</body>
</html>
