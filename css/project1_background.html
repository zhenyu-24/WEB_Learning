<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"> 
<title>菜鸟教程(runoob.com)</title> 
<style>
    /*
    属性	作用	可选值
    background-color	设置背景颜色	颜色值（十六进制、rgb、颜色名等）
    background-image	设置背景图片	url('图片地址')、none
    background-repeat	设置背景图片是否重复	repeat（默认）、no-repeat、repeat-x、repeat-y
    background-attachment	设置背景图片是否固定	scroll（默认）、fixed、local
    background-position	设置背景图片位置	top、bottom、left、right、center、百分比、像素
    */
    body
    {
        background-image:url('https://static.jyshare.com/images/mix/img_tree.png');
        background-repeat:no-repeat;
        background-position:right top;
        margin-right:200px;
    }
    h1
    {
        background-color:#6495ed;
    }
    p
    {
        background-color:#e0ffff;
    }
    div
    {
        background-color:#b0c4de;
    }
</style>
</head>

<body>
<h1>Hello World!</h1>
<p>该文本不容易被阅读。</p>
</body>

</html>
